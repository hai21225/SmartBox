<head>
    <meta charset="UTF-8">
    <title>SmartBox</title>

    <!-- CSS phải để ở đây -->
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <button onclick="showPickup()">Nhận đồ</button>

    <hr>

    <div id="main">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username"><br><br>
        <input type="password" id="loginPassword" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>

        <h2>Register</h2>
        <input type="text" id="regUsername" placeholder="Username"><br><br>
        <input type="password" id="regPassword" placeholder="Password"><br><br>
        <input type="password" id="regConfirm" placeholder="Confirm Password"><br><br>
        <button onclick="register()">Register</button>
    </div>

    <div id="content"></div>
    <pre id="result"></pre>

    <script src="/js/auth.js"></script>
</body>
