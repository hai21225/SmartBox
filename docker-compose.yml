services: 
    sqlserver: 
      image: mcr.microsoft.com/mssql/server:2022-latest
      container_name: smb-db
      environment:
        - ACCEPT_EULA=Y
        - SA_PASSWORD=YourStrong!Passw0rd
      ports:
        - "1433:1433"
      volumes:
        - db-data:/var/opt/mssql
      networks:
        - smb-net
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 10

    core:
      image: core
      container_name: core
      ports:
        - "5033:5033"
      depends_on:
        sqlserver:
          condition: service_healthy
      environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5033
        - ConnectionStrings__DefaultConnection=Server=smb-db;Database=Users;User Id=sa;Password=YourStrong!Passw0rd;Trust Server Certificate=True;
      networks:
        - smb-net
      restart: unless-stopped

    web:
      image: web
      container_name: web
      ports:
        - "5151:5151"
      depends_on:
        sqlserver:
          condition: service_healthy
      environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5151
      networks:
        - smb-net
      restart: unless-stopped

volumes:
  db-data:
networks:
  smb-net:
    driver: bridge